[tools]
bun = "1.3"

[tasks.test]
run = "bun run vitest run"

[tasks.typecheck]
run = "bun run tsc --noEmit"

[tasks.lint]
run = "bun run check"

[tasks.format]
run = "bun run fix"

[tasks.build]
run = "bun run mastra build"

[tasks.dev]
run = "bun run mastra dev"

[tasks."pipeline:run"]
run = "bun run src/index.ts work-next"
