version: 1
default_workflow: default

entrypoints:
  pipe:
    workflow: default
    description: Full pipeline
  inspect:
    workflow: inspect
    description: Read-only repository inspection
  epic:
    workflow: epic-drain
    description: Route an epic's tickets into specialist tracks, run them in parallel, then thermo-nuclear review.

orchestrator:
  profile: orchestrator
  hooks: [generated-defaults-audit]

hooks:
  generated-defaults-audit:
    event: workflow.start
    kind: command
    command:
      - node
      - -e
      - |
        const fs = require("node:fs");
        const files = [".pipeline/profiles.yaml", ".mcp.json"].filter((file) => fs.existsSync(file));
        const text = files.map((file) => fs.readFileSync(file, "utf8")).join("\n").toLowerCase();
        const banned = ["atlassian", "jira", "linear", "confluence", "compass", "sentry", "deepwiki"];
        const hits = banned.filter((item) => text.includes(item));
        const githubUrls = [...text.matchAll(/https:\/\/api\.githubcopilot\.com\/mcp[^"'\s]*/g)].map((match) => match[0]);
        const writeGithub = githubUrls.filter((url) => !url.includes("/readonly"));
        if (hits.length || writeGithub.length) {
          console.error(["Banned generated defaults detected.", hits.length ? "services=" + hits.join(",") : "", writeGithub.length ? "github=" + writeGithub.join(",") : ""].filter(Boolean).join(" "));
          process.exit(1);
        }
    required: true
    trusted: true
    timeout_ms: 5000
    output_limit_bytes: 4096

workflows:
  inspect:
    description: Read-only repository inspection workflow.
    nodes:
      - id: inspect
        kind: agent
        profile: pipeline-inspector
  default:
    description: Default research, red, green, acceptance, verify, learn workflow.
    nodes:
      - id: research
        kind: agent
        profile: pipeline-researcher
      - id: red
        kind: agent
        profile: pipeline-test-writer
        needs: [research]
        gates:
          - id: red-test-file-policy
            kind: changed_files
            changed_files:
              allow:
                [
                  "**/*.test.*",
                  "**/*.spec.*",
                  "**/*_test.*",
                  "**/__tests__/**",
                  "test/**",
                  "tests/**",
                  "**/*.snap",
                ]
              require_any:
                [
                  "**/*.test.*",
                  "**/*.spec.*",
                  "**/*_test.*",
                  "**/__tests__/**",
                  "test/**",
                  "tests/**",
                ]
      - id: green
        kind: agent
        profile: pipeline-code-writer
        needs: [red]
      - id: acceptance
        kind: agent
        profile: pipeline-acceptance-reviewer
        needs: [green]
        gates:
          - id: acceptance-coverage
            kind: acceptance
            target: stdout
            required: false
          - id: acceptance-verdict
            kind: verdict
            target: stdout
      - id: verify
        kind: agent
        profile: pipeline-verifier
        needs: [acceptance]
        gates:
          - id: verify-typecheck
            kind: builtin
            builtin: typecheck
          - id: verify-tests
            kind: builtin
            builtin: test
          - id: verify-semgrep
            kind: builtin
            builtin: semgrep
          - id: verify-duplication
            kind: builtin
            builtin: duplication
          - id: verify-verdict
            kind: verdict
            target: stdout
      - id: learn
        kind: agent
        profile: pipeline-learner
        needs: [verify]
  infra:
    description: Default-shaped stub workflow for infrastructure specialization.
    nodes:
      - id: research
        kind: agent
        profile: pipeline-researcher
      - id: red
        kind: agent
        profile: pipeline-test-writer
        needs: [research]
        gates:
          - id: red-test-file-policy
            kind: changed_files
            changed_files:
              allow:
                [
                  "**/*.test.*",
                  "**/*.spec.*",
                  "**/*_test.*",
                  "**/__tests__/**",
                  "test/**",
                  "tests/**",
                  "**/*.snap",
                ]
              require_any:
                [
                  "**/*.test.*",
                  "**/*.spec.*",
                  "**/*_test.*",
                  "**/__tests__/**",
                  "test/**",
                  "tests/**",
                ]
      - id: green
        kind: agent
        profile: pipeline-code-writer
        needs: [red]
      - id: acceptance
        kind: agent
        profile: pipeline-acceptance-reviewer
        needs: [green]
        gates:
          - id: acceptance-coverage
            kind: acceptance
            target: stdout
            required: false
          - id: acceptance-verdict
            kind: verdict
            target: stdout
      - id: verify
        kind: agent
        profile: pipeline-verifier
        needs: [acceptance]
        gates:
          - id: verify-typecheck
            kind: builtin
            builtin: typecheck
          - id: verify-tests
            kind: builtin
            builtin: test
          - id: verify-semgrep
            kind: builtin
            builtin: semgrep
          - id: verify-duplication
            kind: builtin
            builtin: duplication
          - id: verify-verdict
            kind: verdict
            target: stdout
      - id: learn
        kind: agent
        profile: pipeline-learner
        needs: [verify]
  epic-drain:
    description: Research, route, parallel-implement tracks in isolated worktrees, integrate, thermo-nuclear review.
    nodes:
      - id: research
        kind: agent
        profile: pipeline-researcher
      - id: plan
        kind: agent
        profile: pipeline-epic-router
        needs: [research]
      - id: implement
        kind: parallel
        needs: [plan]
        nodes:
          - id: test
            kind: workflow
            workflow: default
            worktree_root: .pipeline/runs/${runId}/test
          - id: frontend
            kind: workflow
            workflow: default
            worktree_root: .pipeline/runs/${runId}/frontend
          - id: backend
            kind: workflow
            workflow: default
            worktree_root: .pipeline/runs/${runId}/backend
          - id: k8s
            kind: workflow
            workflow: infra
            worktree_root: .pipeline/runs/${runId}/k8s
      - id: merge
        kind: builtin
        builtin: drain-merge
        needs: [implement]
      - id: review
        kind: agent
        profile: pipeline-thermo-nuclear-reviewer
        needs: [merge]
        gates:
          - id: review-verdict
            kind: verdict
            target: stdout
