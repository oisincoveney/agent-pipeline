version: 1
default_workflow: default

entrypoints:
  pipe:
    workflow: default
    description: Full agent pipeline.
  dogfood:
    workflow: dogfood-options
    description: Deterministic local dogfood workflow.

orchestrator:
  profile: orchestrator
  hooks: [dogfood-workflow-start]

hooks:
  dogfood-workflow-start:
    event: workflow.start
    kind: command
    command: [node, -e, "const fs=require('node:fs'); fs.mkdirSync('.pipeline/dogfood',{recursive:true}); fs.appendFileSync('.pipeline/dogfood/hooks.log', 'workflow.start ' + process.argv[1] + '\\\\n');", "{{workflow.id}}"]
    required: true
    trusted: true
    output_limit_bytes: 4096
  dogfood-node-start:
    event: node.start
    kind: command
    command: [node, -e, "const fs=require('node:fs'); fs.mkdirSync('.pipeline/dogfood',{recursive:true}); fs.appendFileSync('.pipeline/dogfood/hooks.log', 'node.start ' + process.argv[1] + '\\\\n');", "{{node.id}}"]
    required: true
    trusted: true
    output_limit_bytes: 4096
  dogfood-optional-failure:
    event: workflow.complete
    kind: command
    command: [node, -e, "process.exit(9)"]
    required: false
    trusted: true

workflows:
  default:
    description: Default research, red, green, acceptance, verify, learn workflow.
    nodes:
      - id: research
        kind: agent
        profile: pipeline-researcher
      - id: red
        kind: agent
        profile: pipeline-test-writer
        needs: [research]
      - id: green
        kind: agent
        profile: pipeline-code-writer
        needs: [red]
      - id: acceptance
        kind: agent
        profile: pipeline-acceptance-reviewer
        needs: [green]
        gates:
          - id: acceptance-verdict
            kind: verdict
            target: stdout
      - id: verify
        kind: agent
        profile: pipeline-verifier
        needs: [acceptance]
        gates:
          - id: verify-verdict
            kind: verdict
            target: stdout
      - id: learn
        kind: agent
        profile: pipeline-learner
        needs: [verify]
  dogfood:
    description: Local model-free dogfood workflow for this repository.
    hooks: [dogfood-workflow-start, dogfood-optional-failure]
    nodes:
      - id: agent-boundary
        kind: agent
        profile: dogfood-checker
        hooks: [dogfood-node-start]
        gates:
          - id: expected-failing-command
            kind: command
            command: [node, -e, "process.exit(2)"]
            expect_exit_code: 2
          - id: dogfood-output-schema
            kind: json_schema
            target: stdout
            schema_path: .pipeline/schemas/dogfood.schema.json
          - id: dogfood-verdict
            kind: verdict
            target: stdout
      - id: typecheck
        kind: builtin
        builtin: typecheck
        needs: [agent-boundary]
      - id: tests
        kind: builtin
        builtin: test
        needs: [typecheck]
  dogfood-options:
    description: Local deterministic coverage for hooks, gates, artifacts, retries, and parallel nodes.
    hooks: [dogfood-workflow-start, dogfood-optional-failure]
    nodes:
      - id: artifact
        kind: agent
        profile: dogfood-artifact-writer
        artifacts:
          - path: .pipeline/dogfood/artifact.json
        gates:
          - id: artifact-schema
            kind: json_schema
            target: artifact
            path: .pipeline/dogfood/artifact.json
            schema_path: .pipeline/schemas/dogfood.schema.json
          - id: artifact-verdict
            kind: verdict
            target: artifact
            path: .pipeline/dogfood/artifact.json
      - id: retry-gate
        kind: command
        command: [node, -e, "console.log('retry node ran')"]
        retries:
          max_attempts: 2
        gates:
          - id: flaky-once
            kind: command
            command: [node, -e, "const fs=require('node:fs'); const p='.pipeline/dogfood/retry-count'; let n=0; try{n=Number(fs.readFileSync(p,'utf8'))}catch{}; fs.mkdirSync('.pipeline/dogfood',{recursive:true}); fs.writeFileSync(p,String(n+1)); process.exit(n === 0 ? 1 : 0);"]
        needs: [artifact]
      - id: parallel-left
        kind: builtin
        builtin: typecheck
        needs: [retry-gate]
      - id: parallel-right
        kind: builtin
        builtin: test
        needs: [retry-gate]
      - id: join
        kind: group
        nodes: [parallel-left, parallel-right]
        needs: [parallel-left, parallel-right]
  dogfood-live-runners:
    description: Minimal live runner smoke for Codex, Claude, OpenCode, Kimi, and Pi.
    nodes:
      - id: codex-live
        kind: agent
        profile: dogfood-codex-live
      - id: claude-live
        kind: agent
        profile: dogfood-claude-live
      - id: opencode-live
        kind: agent
        profile: dogfood-opencode-live
      - id: kimi-live
        kind: agent
        profile: dogfood-kimi-live
      - id: pi-live
        kind: agent
        profile: dogfood-pi-live
